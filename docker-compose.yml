services:
  hubitat-mcp:
    # Pull pre-built multi-arch image from GitHub Container Registry.
    # Image is built and published by .github/workflows/docker-publish.yml
    # on every push to main and every v* tag.
    #
    # To build from source instead (development), comment out the `image:` line
    # below and uncomment the `build:` block.
    image: ghcr.io/pghart/hubitat-mcp:latest
    # build:
    #   context: ./app
    #   dockerfile: Dockerfile
    container_name: hubitat-mcp
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      HUBITAT_HUB_IP: "${HUBITAT_HUB_IP:?HUBITAT_HUB_IP is required}"
      HUBITAT_APP_ID: "${HUBITAT_APP_ID:?HUBITAT_APP_ID is required}"
      HUBITAT_ACCESS_TOKEN: "${HUBITAT_ACCESS_TOKEN:?HUBITAT_ACCESS_TOKEN is required}"
      MCP_BEARER_TOKEN: "${MCP_BEARER_TOKEN:?MCP_BEARER_TOKEN is required}"
      AUDIT_LOG_PATH: "/var/log/hubitat-mcp/audit.log"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      HTTP_TIMEOUT: "${HTTP_TIMEOUT:-10}"
    volumes:
      - /opt/docker/stacks/hubitat-mcp/logs:/var/log/hubitat-mcp
    networks:
      - hubitat-mcp-net
    labels:
      # Matches your existing Dozzle / monitoring conventions
      com.docker.compose.project: "hubitat-mcp"

networks:
  hubitat-mcp-net:
    driver: bridge
